name: DSA Pytest Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f dsa_training/requirements.txt ]; then pip install -r dsa_training/requirements.txt; fi
    - name: Run Pytest
      run: |
        cd dsa_training
        pytest --cov=./
